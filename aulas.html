<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Estudiantil</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/asistencia.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>

    <div class="layout">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">

            <div class="logo">
                <div class="logo-box">SE</div>
                <div>
                    <h2>Sistema</h2>
                    <span>Administrativo</span>
                </div>
            </div>
            <nav class="menu">

                <!-- <button onclick="cargarVista('dashboard')">
                    <span>🏠</span>
                    Dashboard
                </button> -->

                <button onclick="location.href='aulas.html'">
                    <span>🏫</span>
                    Aulas
                </button>

                <button onclick="location.href='materias.html'">
                    <span>📚</span>
                    Materias
                </button>

                <button onclick="location.href='alumnos.html'">
                    <span>👨‍🎓</span>
                    Alumnos
                </button>

                <!-- <button onclick="location.href='asistencia.html'">
                    <span>📅</span>
                    Gestionar Asitencia
                </button> -->

                <button onclick="location.href='asignar-alumnos.html'">
                    <span>✅</span>
                    Asignar alumnos
                </button>

            </nav>

            <div class="sidebar-footer">
                <div class="user-card">
                    <div class="avatar">M</div>
                    <div>
                        <strong>ADMIN</strong>
                        <span>Administrador</span>
                    </div>
                </div>
            </div>

        </aside>

        <div class="overlay" id="overlay" onclick="cerrarSidebar()"></div>
        <!-- Contenido -->
        <div class="main-content">

            <!-- Header -->
            <header class="topbar">

                <button class="menu-toggle" onclick="toggleSidebar()">
                    ☰
                </button>

                <div>
                    <h1>Sistema Estudiantil</h1>
                    <p>Administración académica</p>
                </div>

            </header>


            <!-- Vista dinámica -->
            <main id="app">
                <div class="page-wrapper">
                    <div class="card">
                        <div class="card-header">
                            <div>
                                <div class="card-title">Gestión de Aulas</div>
                                <div class="card-subtitle">Administra los espacios donde se imparten clases</div>
                            </div>
                            <button id="btnNuevoAula" class="btn-primary">
                                ➕ Nueva Aula
                            </button>
                        </div>

                        <!-- Tabla de aulas -->
                        <!-- <div style="overflow-x: auto;">
                            <table class="tabla">
                                <thead>
                                    <tr>
                                        <th style="width:60px">#</th>
                                        <th>Codigo de Aula</th>
                                        <th style="width:100px; text-align:center;">Acción</th>
                                    </tr>
                                </thead>
                                <tbody id="aulasTableBody">
                                    <tr class="loading-row">
                                        <td colspan="3">
                                            <div class="spinner"></div> Cargando aulas...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div> -->
                        <div id="renderCards" class="cards">

                        </div>
                        <br/>
                        <div>
                            <button id="previousPage" class="btn btn-primary" onclick="changePage(-1)">Anterior</button>
                            <button id="nextPage" class="btn btn-primary" onclick="changePage(1)">Siguiente</button>
                        </div>
                    </div>
                </div>

                <!-- MODAL para crear/editar aulas -->
                <div id="modalAula" class="modal-overlay">
                    <div class="modal">
                        <div class="modal-title" id="modalTitle">➕ Nueva Aula</div>
                        <div class="modal-sub" style="margin-bottom: 20px;">Ingresa el código del aula</div>

                        <input type="hidden" id="aulaId">

                        <div style="text-align: left; margin-bottom: 24px;">
                            <label
                                style="display: block; font-size: 12px; font-weight: 600; color: #344054; margin-bottom: 6px;">Código
                                del Aula</label>
                            <input type="text" id="codigoAula" placeholder="Ej: A-101, Lab-01, Salón B"
                                style="width: 100%; padding: 10px 12px; border: 1.5px solid #d0d5dd; border-radius: 8px; font-size: 13px; font-family: inherit;">
                        </div>

                        <div style="display: flex; gap: 12px; justify-content: center;">
                            <button id="btnGuardarAula" class="btn-primary">Guardar</button>
                            <button id="btnCancelarModal" class="btn-outline">Cancelar</button>
                        </div>
                    </div>
                </div>

                <!-- MODAL de confirmación para eliminar -->
                <div id="modalDelete" class="modal-overlay">
                    <div class="modal">
                        <div class="modal-title">🗑️ Eliminar Aula</div>
                        <div class="modal-sub" style="margin-bottom: 20px;">¿Estás seguro de eliminar esta aula?</div>
                        <div id="deleteInfo"
                            style="background: #f8f9fb; padding: 8px; border-radius: 8px; margin-bottom: 24px; font-size: 13px; font-weight: 500;">
                        </div>
                        <div style="display: flex; gap: 12px; justify-content: center;">
                            <button id="btnConfirmarDelete" class="btn-primary"
                                style="background: #c0392b;">Confirmar</button>
                            <button id="btnCancelarDelete" class="btn-outline">Cancelar</button>
                        </div>
                    </div>
                </div>
                <div class="toast" id="toast"></div>
            </main>

        </div>

    </div>
    <script src="js/aulas.js"></script>
    <script type="module" src="js/router.js"></script>

</body>

</html>
