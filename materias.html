<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Estudiantil</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/asistencia.css">
  <link rel="stylesheet" href="css/index.css">
</head>

<body>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">

      <div class="logo">
        <div class="logo-box">SE</div>
        <div>
          <h2>Sistema</h2>
          <span>Administrativo</span>
        </div>
      </div>
      <nav class="menu">

        <!-- <button onclick="cargarVista('dashboard')">
                    <span>🏠</span>
                    Dashboard
                </button> -->

        <button onclick="location.href='aulas.html'">
          <span>🏫</span>
          Aulas
        </button>

        <button onclick="location.href='materias.html'">
          <span>📚</span>
          Materias
        </button>

        <button onclick="location.href='alumnos.html'">
          <span>👨‍🎓</span>
          Alumnos
        </button>

        <button onclick="location.href='horarios.html'">
          <span>📅</span>
          Horarios
        </button>

        <button onclick="location.href='asignar-alumnos.html'">
          <span>✅</span>
          Asignar alumnos
        </button>

      </nav>

      <div class="sidebar-footer">
        <div class="user-card">
          <div class="avatar">M</div>
          <div>
            <strong>Mario</strong>
            <span>Administrador</span>
          </div>
        </div>
      </div>

    </aside>

    <div class="overlay" id="overlay" onclick="cerrarSidebar()"></div>
    <!-- Contenido -->
    <div class="main-content">

      <!-- Header -->
      <header class="topbar">

        <button class="menu-toggle" onclick="toggleSidebar()">
          ☰
        </button>

        <div>
          <h1>Sistema Estudiantil</h1>
          <p>Administración académica</p>
        </div>

      </header>


      <!-- Vista dinámica -->
      <main id="app">
        <div class="page-wrapper">
          <div class="card">

            <div class="card-header">
              <div>
                <div class="card-title">📚 Gestión de Materias</div>
                <div class="card-subtitle">Administración de materias disponibles</div>
              </div>
              <button class="btn-primary" id="btn-nueva">
                ➕ Nueva Materia
              </button>
            </div>
            

            <div style="overflow-x: auto;">
              <table class="tabla">
                <thead>
                  <tr>
                    <th style="width:60px">#</th>
                    <th>Codigo de Aula</th>
                    <th style="width:100px; text-align:center;">Acción</th>
                  </tr>
                </thead>
                <tbody id="tabla-body">
                  <tr class="loading-row">
                    <td colspan="3">
                      <span class="spinner"></span>Cargando materias…
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="modal-overlay" id="modal-overlay">
          <div class="modal">
            <div class="modal-title" id="modal-titulo">Nueva Materia</div>
            <p class="modal-sub" style="margin-bottom:20px;font-size:12px;color:#8a92a6" id="modal-sub">Completa los
              datos para guardar</p>

            <div class="form-group">
              <label class="form-label" for="input-nombre">Nombre de la Materia</label>
              <input type="text" id="input-nombre" class="form-input" placeholder="Ej: Bases de Datos I" />
            </div>

            <div class="modal-actions">
              <button class="btn-outline" id="btn-cancelar">Cancelar</button>
              <button class="btn-primary" id="btn-guardar">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                  <polyline points="17 21 17 13 7 13 7 21" />
                  <polyline points="7 3 7 8 15 8" />
                </svg>
                Guardar
              </button>
            </div>
          </div>
        </div>


        <div class="toast" id="toast"></div>
      </main>

    </div>

  </div>
  <script src="js/materias.js"></script>
  <script type="module" src="js/router.js"></script>

</body>

</html>
