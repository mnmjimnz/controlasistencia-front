<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro de Asistencia</title>
  <link rel="stylesheet" href="css/asistencia.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
  <script src="js/asistencia.js" defer></script>
</head>
<body>

  <div class="page-wrapper">
    <div class="card">

      <div class="card-header">
        <div>
          <h1 class="card-title">Registro de Asistencia</h1>
          <p class="card-subtitle">Monitoreo de entradas en tiempo real</p>
        </div>
        <!-- <button class="btn-primary" id="btn-generar-qr" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          Generar QR de Clase
        </button> -->
      </div>

      <table class="tabla">
        <thead>
          <tr>
            <th>ID Registro</th>
            <th>Catedrático</th>
            <!-- <th>ID Horario Detalle</th> -->
            <th>Hora Inicio</th>
            <th>Hora Fin</th>
            <th>Fecha</th>
            <!-- <th>Estado</th> -->
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="tabla-body">
          <tr class="loading-row">
            <td colspan="7">
              <span class="spinner"></span> Cargando horarios...
            </td>
          </tr>
        </tbody>
      </table>

    </div>
  </div>

  <!-- MODAL QR -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2 class="modal-title">Escanee para Registrarse</h2>
      <p class="modal-sub">Asistencia para el Catedrático:</p>
      <p class="modal-catedratico" id="modal-catedratico">—</p>
      <div id="qr-container">
        <div id="qrcode"></div>
      </div>
      <button class="btn-outline" id="btn-cerrar">Cerrar Ventana</button>
    </div>
  </div>

</body>
</html>
