<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Asistencia</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/asistencia.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>

    <div class="layout">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">

            <div class="logo">
                <div class="logo-box">SE</div>
                <div>
                    <h2>Sistema</h2>
                    <span>Administrativo</span>
                </div>
            </div>
            <nav class="menu">

                <!-- <button onclick="cargarVista('dashboard')">
                    <span>🏠</span>
                    Dashboard
                </button> -->

                <button onclick="location.href='aulas.html'">
                    <span>🏫</span>
                    Aulas
                </button>

                <button onclick="location.href='materias.html'">
                    <span>📚</span>
                    Materias
                </button>

                <button onclick="location.href='alumnos.html'">
                    <span>👨‍🎓</span>
                    Alumnos
                </button>

                <button onclick="location.href='asistencia.html'">
                    <span>📅</span>
                    Gestionar Asitencia
                </button>

                <button onclick="location.href='asignar-alumnos.html'">
                    <span>✅</span>
                    Asignar alumnos
                </button>

            </nav>

            <div class="sidebar-footer">
                <div class="user-card">
                    <div class="avatar">M</div>
                    <div>
                        <strong>Mario</strong>
                        <span>Administrador</span>
                    </div>
                </div>
            </div>

        </aside>

        <div class="overlay" id="overlay" onclick="cerrarSidebar()"></div>
        <!-- Contenido -->
        <div class="main-content">

            <!-- Header -->
            <header class="topbar">

                <button class="menu-toggle" onclick="toggleSidebar()">
                    ☰
                </button>

                <div>
                    <h1>Sistema Estudiantil</h1>
                    <p>Administración académica</p>
                </div>

            </header>


            <!-- Vista dinámica -->
            <main id="app">
                <div class="page-wrapper">
                    <div class="card">

                        <div class="card-header">
                            <div>
                                <h1 class="card-title">Asistencias confirmadas</h1>
                                <p class="card-subtitle">Monitoreo de entradas en tiempo real</p>
                            </div>
                        </div>

                        <table class="tabla">
                            <thead>
                                <tr>
                                    <th>ID Registro</th>
                                    <th>Nombres</th>
                                    <!-- <th>ID Horario Detalle</th> -->
                                    <th>Carrera</th>
                                    <th>Fecha</th>
                                    <th>Estado</th>
                                    <!-- <th>Estado</th> -->
                                    <!-- <th>Acción</th> -->
                                </tr>
                            </thead>
                            <tbody id="tabla-body">
                                <tr class="loading-row">
                                    <td colspan="7">
                                        <span class="spinner"></span> Cargando horarios...
                                    </td>
                                </tr>
                            </tbody>
                        </table>

                    </div>
                </div>

            </main>
        </div>
    </div>
    <script type="module" src="js/router.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script type="module" src="js/confirmaciones-asistencia.js"></script>
</body>

</html>
